name: "Generate release notes"
description: "Generates categorized release notes from commits between two tags using the GitHub API"

inputs:
  personal-token:
    description: "Personal access token"
    required: true
  previous-tag:
    description: "The tag of the previous release (e.g., v1.2.3)"
    required: true
  new-tag:
    description: "The tag being created (used for display in notes)"
    required: true
  target-ref:
    description: "The branch or commit SHA to compare against the previous tag"
    required: false
    default: "main"

outputs:
  release-notes:
    description: "The generated Markdown release notes"
    value: ${{ steps.generate.outputs.release-notes }}

runs:
  using: "composite"
  steps:
    - name: Generate release notes
      id: generate
      run: |
        PREVIOUS_TAG="${{ inputs.previous-tag }}"
        NEW_TAG="${{ inputs.new-tag }}"
        TARGET_REF="${{ inputs.target-ref }}"
        TOKEN="${{ inputs.personal-token }}"
        REPO="${{ github.repository }}"
        API_URL="https://github.tools.sap/api/v3"

        # Handle first release (no previous tag or v0.0.0)
        if [[ -z "$PREVIOUS_TAG" || "$PREVIOUS_TAG" == "v0.0.0" || "$PREVIOUS_TAG" == "0.0.0" ]]; then
          notes="## Initial Release ${NEW_TAG}"
          echo "release-notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          echo "$notes" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Fetch commits between previous tag and target ref via Compare API
        compare_response=$(
          curl --silent \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${TOKEN}" \
            "${API_URL}/repos/${REPO}/compare/${PREVIOUS_TAG}...${TARGET_REF}"
        )

        # Extract commit messages and SHAs, filter out bot and merge commits
        commits=$(echo "$compare_response" | jq -r '
          .commits // []
          | map(select(
              (.commit.author.name != "cs-devops-gh-actions-serviceuser") and
              (.commit.author.name != "ospo-renovate[bot]") and
              (.commit.message | test("^Merge (pull request|branch)") | not) and
              (.commit.message | test("^Bump version") | not)
          ))
          | map({
              sha: .sha[0:7],
              message: (.commit.message | split("\n") | .[0])
          })
        ')

        commit_count=$(echo "$commits" | jq 'length')

        # Handle zero commits
        if [[ "$commit_count" -eq 0 ]]; then
          notes="Release ${NEW_TAG} -- no changes since ${PREVIOUS_TAG}"
          echo "release-notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          echo "$notes" >> $GITHUB_OUTPUT
          echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Categorize commits
        breaking=""
        features=""
        fixes=""
        improvements=""
        docs=""
        other=""

        while IFS= read -r commit_json; do
          message=$(echo "$commit_json" | jq -r '.message')
          sha=$(echo "$commit_json" | jq -r '.sha')

          # Check for breaking changes (! before colon in conventional commits)
          if [[ "$message" =~ ^[a-z]+(\(.+\))?!:\ (.+)$ ]]; then
            description="${BASH_REMATCH[2]}"
            breaking="${breaking}- ${description} (${sha})\n"
          elif [[ "$message" =~ ^feat(\(.+\))?:\ (.+)$ ]]; then
            description="${BASH_REMATCH[2]}"
            features="${features}- ${description} (${sha})\n"
          elif [[ "$message" =~ ^fix(\(.+\))?:\ (.+)$ ]]; then
            description="${BASH_REMATCH[2]}"
            fixes="${fixes}- ${description} (${sha})\n"
          elif [[ "$message" =~ ^docs(\(.+\))?:\ (.+)$ ]]; then
            description="${BASH_REMATCH[2]}"
            docs="${docs}- ${description} (${sha})\n"
          elif [[ "$message" =~ ^(perf|refactor|chore|ci|build|style|test|revert)(\(.+\))?:\ (.+)$ ]]; then
            description="${BASH_REMATCH[3]}"
            improvements="${improvements}- ${description} (${sha})\n"
          else
            # Non-conventional commit: use the full message
            other="${other}- ${message} (${sha})\n"
          fi
        done < <(echo "$commits" | jq -c '.[]')

        # Build the release notes
        notes="## What's Changed\n"

        if [[ -n "$breaking" ]]; then
          notes="${notes}\n### ⚠️ Breaking Changes\n${breaking}"
        fi

        if [[ -n "$features" ]]; then
          notes="${notes}\n### 🚀 New Features\n${features}"
        fi

        if [[ -n "$fixes" ]]; then
          notes="${notes}\n### 🐛 Bug Fixes\n${fixes}"
        fi

        if [[ -n "$improvements" ]]; then
          notes="${notes}\n### 🔧 Improvements\n${improvements}"
        fi

        if [[ -n "$docs" ]]; then
          notes="${notes}\n### 📄 Documentation\n${docs}"
        fi

        if [[ -n "$other" ]]; then
          notes="${notes}\n### Other Changes\n${other}"
        fi

        notes="${notes}\n**Full Changelog**: https://github.tools.sap/${REPO}/compare/${PREVIOUS_TAG}...${NEW_TAG}"

        # Write multi-line output
        echo "release-notes<<RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
        echo -e "$notes" >> $GITHUB_OUTPUT
        echo "RELEASE_NOTES_EOF" >> $GITHUB_OUTPUT
      shell: bash
