name: "Generate release notes"
description: "Generates categorized release notes from commits between two tags using the GitHub API"

inputs:
  personal-token:
    description: "Personal access token"
    required: true
  previous-tag:
    description: "The tag of the previous release (e.g., v1.2.3)"
    required: true
  new-tag:
    description: "The tag being created (used for display in notes)"
    required: true
  target-ref:
    description: "The branch or commit SHA to compare against the previous tag"
    required: false
    default: "main"

outputs:
  release-notes:
    description: "The generated Markdown release notes"
    value: ${{ steps.generate.outputs.release-notes }}

runs:
  using: "composite"
  steps:
    - name: Generate release notes
      id: generate
      env:
        INPUT_PREVIOUS_TAG: ${{ inputs.previous-tag }}
        INPUT_NEW_TAG: ${{ inputs.new-tag }}
        INPUT_TARGET_REF: ${{ inputs.target-ref }}
        INPUT_TOKEN: ${{ inputs.personal-token }}
        REPO: ${{ github.repository }}
        API_URL: "https://github.tools.sap/api/v3"
      run: ${{ github.action_path }}/generate-release-notes.sh
      shell: bash
